<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenClaw Dev Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      padding: 32px 16px;
    }
    .container { max-width: 1100px; margin: 0 auto; }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid #21262d;
    }
    header h1 { font-size: 24px; font-weight: 700; }
    header p { color: #8b949e; font-size: 14px; margin-top: 4px; }
    .stats {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 16px 24px;
      flex: 1;
      min-width: 120px;
      text-align: center;
    }
    .stat-card .num { font-size: 32px; font-weight: 700; }
    .stat-card .label { color: #8b949e; font-size: 13px; margin-top: 4px; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 16px;
    }
    .card {
      background: #161b22;
      border: 1px solid #21262d;
      border-radius: 10px;
      padding: 20px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #388bfd; }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
    }
    .card-title { font-size: 16px; font-weight: 600; }
    .badge {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
      white-space: nowrap;
    }
    .badge-done { background: #1f6feb33; color: #58a6ff; border: 1px solid #1f6feb; }
    .badge-review { background: #d29922 22; color: #d29922; border: 1px solid #9e6a03; }
    .badge-dev { background: #2ea04326; color: #3fb950; border: 1px solid #238636; }
    .badge-blocked { background: #da363326; color: #f85149; border: 1px solid #6e1a1a; }
    .card-desc { color: #8b949e; font-size: 13px; margin-bottom: 14px; line-height: 1.5; }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #8b949e;
    }
    .owner { display: flex; align-items: center; gap: 6px; }
    .avatar {
      width: 20px; height: 20px;
      background: #21262d;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .tag {
      background: #21262d;
      color: #8b949e;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .discord-link {
      color: #5865f2;
      text-decoration: none;
      font-size: 12px;
    }
    .discord-link:hover { text-decoration: underline; }
    .updated { color: #484f58; font-size: 11px; }
    .logo { font-size: 28px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">🦾</div>
      <div>
        <h1>OpenClaw Dev Dashboard</h1>
        <p>並行開発プロジェクト一覧</p>
      </div>
    </header>
    <div class="stats" id="stats"></div>
    <div class="grid" id="grid"></div>
  </div>

  <script>
    const statusClass = {
      '完了': 'badge-done',
      '要件確認中': 'badge-review',
      '開発中': 'badge-dev',
      'ブロック中': 'badge-blocked',
    };

    const ownerColors = {
      'abcz': '#f78166',
      'miura': '#79c0ff',
      'Y Kuwashima': '#7ee787',
    };

    fetch('./projects.json')
      .then(r => r.json())
      .then(projects => {
        // Stats
        const total = projects.length;
        const done = projects.filter(p => p.status === '完了').length;
        const inProgress = projects.filter(p => p.status === '開発中').length;
        const review = projects.filter(p => p.status === '要件確認中').length;

        document.getElementById('stats').innerHTML = `
          <div class="stat-card"><div class="num">${total}</div><div class="label">総プロジェクト</div></div>
          <div class="stat-card"><div class="num" style="color:#3fb950">${done}</div><div class="label">完了</div></div>
          <div class="stat-card"><div class="num" style="color:#58a6ff">${inProgress}</div><div class="label">開発中</div></div>
          <div class="stat-card"><div class="num" style="color:#d29922">${review}</div><div class="label">要件確認中</div></div>
        `;

        // Cards
        document.getElementById('grid').innerHTML = projects.map(p => {
          const initials = p.owner.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
          const color = ownerColors[p.owner] || '#8b949e';
          const tags = p.stack.map(t => `<span class="tag">${t}</span>`).join('');
          return `
            <div class="card">
              <div class="card-header">
                <div class="card-title">${p.name}</div>
                <span class="badge ${statusClass[p.status] || 'badge-review'}">${p.status}</span>
              </div>
              <p class="card-desc">${p.description}</p>
              <div class="tags">${tags}</div>
              <div class="card-meta">
                <div class="owner">
                  <div class="avatar" style="background:${color}22;color:${color}">${initials}</div>
                  ${p.owner}
                </div>
                <a class="discord-link" href="https://discord.com/channels/1476013651021398226/${p.channelId}" target="_blank">#${p.channel}</a>
              </div>
              <div class="updated" style="margin-top:8px">更新: ${p.updatedAt}</div>
            </div>
          `;
        }).join('');
      });
  </script>
</body>
</html>
